<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>부품 견적서 - 위페어</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      font-size: 12px;
      color: #1a1a1a;
      background: #fff;
    }
    .page {
      width: 794px;
      min-height: 1123px;
      margin: 0 auto;
      padding: 48px 48px 40px;
    }

    /* 제목 */
    .title {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 10px;
      margin-bottom: 28px;
    }

    /* 상단 정보 영역 */
    .header-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }
    .meta-table, .supplier-table {
      width: 100%;
      border-collapse: collapse;
    }
    .meta-table td, .supplier-table td {
      border: 1px solid #999;
      padding: 6px 10px;
      vertical-align: middle;
    }
    .meta-table td:first-child,
    .supplier-table td:first-child {
      background: #f0f0f0;
      font-weight: 700;
      width: 80px;
      white-space: nowrap;
    }
    .supplier-table td:first-child { width: 90px; }

    /* 차량 정보 */
    .vehicle-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 14px;
    }
    .vehicle-table td {
      border: 1px solid #999;
      padding: 6px 10px;
      vertical-align: middle;
    }
    .vehicle-table td.label {
      background: #f0f0f0;
      font-weight: 700;
      width: 70px;
      white-space: nowrap;
    }
    .vehicle-table td.value { min-width: 120px; }
    .vehicle-table td.value-wide { min-width: 200px; }

    /* 품목 테이블 */
    .items-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 14px;
    }
    .items-table th {
      background: #f0f0f0;
      border: 1px solid #999;
      padding: 7px 6px;
      text-align: center;
      font-weight: 700;
    }
    .items-table td {
      border: 1px solid #999;
      padding: 6px 8px;
      vertical-align: middle;
    }
    .items-table td.center { text-align: center; }
    .items-table td.right { text-align: right; }
    .items-table tr.empty td { height: 28px; }
    .col-no    { width: 36px; }
    .col-name  { }
    .col-qty   { width: 46px; }
    .col-price { width: 110px; }
    .col-total { width: 110px; }
    .items-table th { line-height: 1.4; }

    /* 합계 영역 */
    .summary-wrap {
      display: flex;
      justify-content: flex-end;
    }
    .summary-table {
      border-collapse: collapse;
      width: 320px;
    }
    .summary-table td {
      border: 1px solid #999;
      padding: 7px 12px;
    }
    .summary-table td:first-child {
      background: #f0f0f0;
      font-weight: 700;
      text-align: center;
      width: 160px;
    }
    .summary-table td:last-child {
      text-align: right;
    }
    .summary-table tr.total-row td {
      font-weight: 700;
      font-size: 13px;
    }

    /* 인쇄용 */
    @media print {
      body { background: #fff; }
      .page { margin: 0; padding: 20mm 18mm; width: 210mm; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- 합계 -->

</body>
</html>
